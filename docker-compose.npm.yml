services:
  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: keeplocal-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: keeplocal
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/keeplocal --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Service (Whisper Transcription)
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-base}
    container_name: keeplocal-ai
    restart: unless-stopped
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: keeplocal-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/keeplocal
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET environment variable is required}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CSRF_SECRET=${CSRF_SECRET:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-}
      - TRUST_PROXY=1
      - AI_SERVICE_URL=http://ai:5000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-}
      - CLIENT_URL=${CLIENT_URL:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: keeplocal-client
    restart: unless-stopped
    # Only the frontend joins the external proxy network.
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - frontend
      - npm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  npm-network:
    external: true

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
