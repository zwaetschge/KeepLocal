# Supervisor configuration for KeepLocal All-in-One Container
# Manages MongoDB, Node.js Backend, AI Service (Whisper), and Nginx

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

# MongoDB Service
[program:mongodb]
command=/usr/bin/mongod --dbpath /data/db --bind_ip 127.0.0.1 --logpath /var/log/mongodb/mongod.log
autostart=true
autorestart=true
startretries=10
startsecs=10
stdout_logfile=/var/log/supervisor/mongodb-stdout.log
stderr_logfile=/var/log/supervisor/mongodb-stderr.log
priority=1
user=mongodb

# AI Service (Whisper Transcription)
[program:ai]
command=/usr/local/bin/gunicorn --bind 127.0.0.1:5001 --workers 1 --timeout 300 app:app
directory=/app/ai
autostart=true
autorestart=true
startretries=10
startsecs=10
stdout_logfile=/var/log/supervisor/ai-stdout.log
stderr_logfile=/var/log/supervisor/ai-stderr.log
priority=2
user=node
environment=WHISPER_MODEL="%(ENV_WHISPER_MODEL)s",HF_HOME="%(ENV_HF_HOME)s"

# Node.js Backend Service
[program:nodejs]
command=/usr/bin/node server.js
directory=/app/server
autostart=true
autorestart=true
startretries=10
startsecs=10
stdout_logfile=/var/log/supervisor/nodejs-stdout.log
stderr_logfile=/var/log/supervisor/nodejs-stderr.log
priority=3
user=node
environment=NODE_ENV="%(ENV_NODE_ENV)s",PORT="%(ENV_PORT)s",HOST="%(ENV_HOST)s",TRUST_PROXY="%(ENV_TRUST_PROXY)s",MONGODB_URI="%(ENV_MONGODB_URI)s",JWT_SECRET="%(ENV_JWT_SECRET)s",JWT_EXPIRES_IN="%(ENV_JWT_EXPIRES_IN)s",CSRF_SECRET="%(ENV_CSRF_SECRET)s",COOKIE_SECURE="%(ENV_COOKIE_SECURE)s",ALLOWED_ORIGINS="%(ENV_ALLOWED_ORIGINS)s",AI_SERVICE_URL="%(ENV_AI_SERVICE_URL)s",CLIENT_URL="%(ENV_CLIENT_URL)s",GOOGLE_CLIENT_ID="%(ENV_GOOGLE_CLIENT_ID)s",GOOGLE_CLIENT_SECRET="%(ENV_GOOGLE_CLIENT_SECRET)s",GOOGLE_CALLBACK_URL="%(ENV_GOOGLE_CALLBACK_URL)s",GITHUB_CLIENT_ID="%(ENV_GITHUB_CLIENT_ID)s",GITHUB_CLIENT_SECRET="%(ENV_GITHUB_CLIENT_SECRET)s",GITHUB_CALLBACK_URL="%(ENV_GITHUB_CALLBACK_URL)s"

# Nginx Service
[program:nginx]
command=/usr/sbin/nginx -g 'daemon off;'
autostart=true
autorestart=true
startretries=10
startsecs=5
stdout_logfile=/var/log/supervisor/nginx-stdout.log
stderr_logfile=/var/log/supervisor/nginx-stderr.log
priority=4

# Group all services together
[group:keeplocal]
programs=mongodb,ai,nodejs,nginx
priority=999
